<!-- Nouvelles librairies Google (remplace l'ancienne) -->
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>
const CLIENT_ID = '857421313712-ge30q9selkt0s0t0dpa26g7c5l5oqbah.apps.googleusercontent.com';
const API_KEY   = 'AIzaSyBcCfAhpT7_eGXkc07fdBEViaHJHhmNCNA';
const FILE_ID   = '18FuqkytW5j1kbX60h79OubRNJpxswTs-b4d2vbh8Dsw';
const SCOPES    = 'https://www.googleapis.com/auth/drive.file';

let journal = [];
let tokenClient; // ← nouveau avec GIS
let accessToken = null;

// -------------------- INIT GAPI (sans auth2) --------------------
function gapiLoaded() {
  gapi.load('client', initGapiClient);
}

async function initGapiClient() {
  await gapi.client.init({
    apiKey: API_KEY,
    discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
    // ⚠️ Plus de clientId ni scope ici avec la nouvelle méthode
  });

  // Init du client token GIS
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (tokenResponse) => {
      if (tokenResponse.error) {
        console.error('Erreur token', tokenResponse);
        return;
      }
      accessToken = tokenResponse.access_token;
      await chargerJournalDepuisDrive();
    }
  });

  // Demande le token (popup de connexion si nécessaire)
  tokenClient.requestAccessToken({ prompt: '' });
}

window.addEventListener('load', () => {
  gapiLoaded();
});

// -------------------- LECTURE DRIVE --------------------
async function chargerJournalDepuisDrive() {
  try {
    const response = await gapi.client.drive.files.get({
      fileId: FILE_ID,
      alt: 'media'
    });
    journal = JSON.parse(response.body || '[]');
    console.log('Journal chargé depuis Drive :', journal);
    // afficherAgenda(journal); // ← ton affichage ici
  } catch (err) {
    console.error('Erreur lecture journal.json', err);
    alert('Impossible de lire journal.json sur Drive.');
  }
}

// -------------------- ÉCRITURE DRIVE --------------------
async function sauvegarderJournalDansDrive() {
  if (!accessToken) {
    alert('Non connecté à Google.');
    return;
  }
  try {
    const res = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files/' + FILE_ID + '?uploadType=multipart',
      {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + accessToken },
        body: (() => {
          const form = new FormData();
          form.append('metadata', new Blob([JSON.stringify({
            name: 'journal.json',
            mimeType: 'application/json'
          })], { type: 'application/json' }));
          form.append('file', new Blob([JSON.stringify(journal)], { type: 'application/json' }));
          return form;
        })()
      }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    console.log('Journal sauvegardé sur Drive.');
  } catch (err) {
    console.error('Erreur écriture journal.json', err);
    alert('Impossible d\'écrire journal.json sur Drive.');
  }
}
</script>
