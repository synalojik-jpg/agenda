<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Interventions</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
.app{max-width:900px;margin:0 auto;padding:2rem 1rem;}
h1{font-size:20px;font-weight:500;margin-bottom:1.5rem;}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;}
.nav-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:7px 11px;cursor:pointer;font-size:15px;display:flex;align-items:center;}
.nav-btn:hover{background:#eee;}
.period-title{font-size:17px;font-weight:500;flex:1;min-width:120px;}
.view-toggle{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;}
.vt-btn{background:none;border:none;padding:7px 13px;cursor:pointer;font-size:13px;font-family:inherit;color:#888;}
.vt-btn.active{background:#eee;color:#1a1a1a;font-weight:500;}
.icon-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:7px 11px;cursor:pointer;font-size:15px;display:flex;align-items:center;gap:5px;font-family:inherit;font-size:13px;color:#1a1a1a;}
.icon-btn:hover{background:#eee;}

/* EVENT COLORS */
.c0{background:#E6F1FB;border-left-color:#378ADD;}.c0 .tb-name,.c0-pill{color:#0C447C;background:#E6F1FB;}
.c1{background:#FEF3E2;border-left-color:#E8960C;}.c1 .tb-name,.c1-pill{color:#7A4D04;background:#FEF3E2;}
.c2{background:#EAF3DE;border-left-color:#52A82C;}.c2 .tb-name,.c2-pill{color:#2A5A10;background:#EAF3DE;}
.c3{background:#F3E8FD;border-left-color:#9B59D0;}.c3 .tb-name,.c3-pill{color:#52207A;background:#F3E8FD;}
.c4{background:#FDE8E8;border-left-color:#E74C3C;}.c4 .tb-name,.c4-pill{color:#7A1A1A;background:#FDE8E8;}
.c5{background:#E8FAF5;border-left-color:#1ABC9C;}.c5 .tb-name,.c5-pill{color:#0A5C45;background:#E8FAF5;}

/* MONTH */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;background:#fff;}
.day-hdr{text-align:center;font-size:12px;font-weight:500;color:#888;padding:10px 4px;background:#f9f9f7;border-bottom:1px solid #e0e0e0;}
.day-cell{min-height:90px;padding:6px;border-right:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0;cursor:pointer;background:#fff;}
.day-cell:nth-child(7n){border-right:none;}
.day-cell:hover{background:#f7f7f5;}
.day-cell.other-month{background:#fafafa;}
.day-cell.other-month .day-num{color:#ccc;}
.day-cell.today .day-num{background:#378ADD;color:#fff;border-radius:50%;}
.day-num{font-size:13px;font-weight:500;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.event-pill{font-size:10px;border-radius:4px;padding:2px 5px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.event-pill:hover{opacity:.8;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:1rem;}
.stat{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px 16px;}
.stat-lbl{font-size:12px;color:#888;margin-bottom:4px;}
.stat-val{font-size:20px;font-weight:500;}

/* DAY VIEW */
.day-view{background:#fff;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;}
.day-view-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #eee;background:#f9f9f7;}
.dv-date{font-size:16px;font-weight:500;text-transform:capitalize;}
.dv-add{margin-left:auto;background:none;border:1px solid #ddd;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;}
.dv-add:hover{background:#eee;}
.time-grid{display:flex;flex-direction:column;}
.time-row{display:grid;grid-template-columns:52px 1fr;min-height:56px;border-bottom:1px solid #f0f0f0;position:relative;}
.time-row:last-child{border-bottom:none;}
.time-label{font-size:11px;color:#bbb;padding:8px 8px 0;text-align:right;}
.time-slot{padding:4px 8px;cursor:pointer;}
.time-slot:hover{background:#fafafa;}
.time-block{border-radius:7px;padding:7px 10px;margin-bottom:4px;cursor:pointer;border-left:3px solid transparent;}
.time-block:hover{opacity:.85;}
.tb-name{font-size:13px;font-weight:600;}
.tb-time{font-size:11px;color:#888;margin-top:2px;}
.tb-desc{font-size:11px;color:#aaa;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.time-now-line{position:absolute;left:52px;right:0;height:2px;background:#e74c3c;z-index:2;pointer-events:none;}
.time-now-line::before{content:'';position:absolute;left:-5px;top:-4px;width:10px;height:10px;background:#e74c3c;border-radius:50%;}
.no-events{text-align:center;padding:2.5rem;color:#bbb;font-size:14px;}

/* YEAR */
.year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.mini-month{border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;background:#fff;}
.mini-month-title{font-size:13px;font-weight:500;text-align:center;padding:8px;background:#f9f9f7;border-bottom:1px solid #e0e0e0;cursor:pointer;}
.mini-month-title:hover{background:#eee;}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.mini-hdr{font-size:9px;text-align:center;padding:4px 0;color:#aaa;font-weight:500;}
.mini-day{font-size:10px;text-align:center;padding:3px 1px;cursor:pointer;border-radius:3px;}
.mini-day:hover{background:#f0f0f0;}
.mini-day.other{color:#ccc;}
.mini-day.today-d{background:#378ADD;color:#fff;border-radius:50%;}
.mini-day.has-event{font-weight:700;}
.mini-day.has-event::after{content:'';display:block;width:4px;height:4px;border-radius:50%;margin:0 auto;}
.mini-day.has-event.hc0::after{background:#378ADD;}.mini-day.has-event.hc0{color:#185FA5;}
.mini-day.has-event.hc1::after{background:#E8960C;}.mini-day.has-event.hc1{color:#7A4D04;}
.mini-day.has-event.hc2::after{background:#52A82C;}.mini-day.has-event.hc2{color:#2A5A10;}
.mini-day.has-event.hc3::after{background:#9B59D0;}.mini-day.has-event.hc3{color:#52207A;}
.mini-day.has-event.hc4::after{background:#E74C3C;}.mini-day.has-event.hc4{color:#7A1A1A;}
.mini-day.has-event.hc5::after{background:#1ABC9C;}.mini-day.has-event.hc5{color:#0A5C45;}
.year-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem;}
.mini-foot{font-size:11px;color:#888;text-align:center;padding:5px 0 7px;}

/* SYNC BAR */
.sync-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:10px 14px;margin-bottom:1rem;flex-wrap:wrap;}
.sync-bar span{font-size:13px;color:#888;flex:1;}
.sync-info{font-size:12px;color:#aaa;margin-top:4px;width:100%;}

/* MODAL */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.18);}
.modal-head{padding:1.4rem 1.75rem 1rem;border-bottom:1px solid #eee;}
.modal-head .date-label{font-size:13px;color:#888;margin-bottom:3px;text-transform:capitalize;}
.modal-head .date-main{font-size:21px;font-weight:500;}
.modal-body{padding:1.4rem 1.75rem;}
.section-label{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.field-row.single{grid-template-columns:1fr;}
.fg{display:flex;flex-direction:column;gap:6px;}
.fg label{font-size:14px;color:#555;}
.fg input,.fg textarea{padding:10px 13px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;background:#fff;color:#1a1a1a;width:100%;transition:border-color .15s;}
.fg input:focus,.fg textarea:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,.1);}
.fg textarea{resize:vertical;min-height:80px;line-height:1.6;}
.duree-pill{display:inline-flex;align-items:center;gap:7px;background:#E6F1FB;color:#185FA5;font-size:14px;border-radius:20px;padding:6px 14px;margin-bottom:16px;font-weight:500;}
.divider{border:none;border-top:1px solid #eee;margin:14px 0;}
.modal-foot{padding:1rem 1.75rem 1.4rem;border-top:1px solid #eee;display:flex;gap:10px;align-items:center;}
.btn-save{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:11px 22px;font-size:15px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;}
.btn-save:hover{background:#333;}
.btn-cancel{background:none;border:1px solid #ddd;border-radius:8px;padding:11px 18px;font-size:15px;cursor:pointer;font-family:inherit;color:#1a1a1a;}
.btn-cancel:hover{background:#f5f5f3;}
.btn-del{background:none;border:1px solid #f09595;border-radius:8px;padding:11px 16px;font-size:15px;cursor:pointer;color:#a32d2d;font-family:inherit;margin-left:auto;display:flex;align-items:center;gap:7px;}
.btn-del:hover{background:#fef0f0;}
.err{font-size:13px;color:#c0392b;margin-top:6px;padding:8px 12px;background:#fef0f0;border-radius:6px;}
@media(max-width:600px){
  .field-row{grid-template-columns:1fr;}
  .year-grid{grid-template-columns:repeat(2,1fr);}
  .stats-row,.year-stats{grid-template-columns:1fr 1fr;}
  .vt-btn{padding:7px 9px;font-size:12px;}
  .top-bar{gap:6px;}
}
</style>
</head>
<body>
<div class="app">
  <h1><i class="ti ti-calendar-event"></i> Agenda interventions</h1>

  <div class="sync-bar">
    <span><i class="ti ti-refresh"></i> Synchronisation entre appareils</span>
    <button class="icon-btn" onclick="exportJSON()"><i class="ti ti-upload"></i> Sauvegarder</button>
    <label class="icon-btn" style="cursor:pointer;"><i class="ti ti-download"></i> Restaurer <input type="file" accept=".json" onchange="importJSON(event)" style="display:none"></label>
    <div class="sync-info">💡 Sauvegarde → envoie le fichier .json par mail/AirDrop → Restaure sur l'autre appareil</div>
  </div>

  <div class="top-bar">
    <button class="nav-btn" onclick="navPrev()"><i class="ti ti-chevron-left"></i></button>
    <span class="period-title" id="period-title"></span>
    <button class="nav-btn" onclick="navNext()"><i class="ti ti-chevron-right"></i></button>
    <div class="view-toggle">
      <button class="vt-btn active" id="vt-month" onclick="setView('month')">Mois</button>
      <button class="vt-btn" id="vt-day" onclick="setView('day')">Jour</button>
      <button class="vt-btn" id="vt-year" onclick="setView('year')">Année</button>
    </div>
    <button class="icon-btn" onclick="exportCSV()"><i class="ti ti-table-export"></i> CSV</button>
  </div>

  <div id="view-month">
    <div class="cal-grid" id="cal-grid"></div>
    <div class="stats-row" id="stats-row"></div>
  </div>

  <div id="view-day" style="display:none;">
    <div class="day-view">
      <div class="day-view-head">
        <span class="dv-date" id="dv-date"></span>
        <button class="dv-add" onclick="openModal(curDayStr())"><i class="ti ti-plus"></i> Ajouter</button>
      </div>
      <div class="time-grid" id="time-grid"></div>
    </div>
    <div class="stats-row" id="day-stats-row"></div>
  </div>

  <div id="view-year" style="display:none;">
    <div class="year-stats" id="year-stats"></div>
    <div class="year-grid" id="year-grid"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="date-label" id="modal-weekday"></div>
      <div class="date-main" id="modal-datestr"></div>
    </div>
    <div class="modal-body">
      <div class="section-label">Client</div>
      <div class="field-row">
        <div class="fg"><label>Nom</label><input type="text" id="m-nom" placeholder="Dupont Marie" /></div>
        <div class="fg"><label>Tarif (€/h)</label><input type="number" id="m-tarif" placeholder="50" step="0.5" oninput="calcDuree()" /></div>
      </div>
      <div class="field-row single">
        <div class="fg"><label>Adresse</label><input type="text" id="m-adresse" placeholder="12 rue de la Paix, 75001 Paris" /></div>
      </div>
      <hr class="divider">
      <div class="section-label">Horaires</div>
      <div class="field-row">
        <div class="fg"><label>Arrivée</label><input type="time" id="m-arrivee" oninput="calcDuree()" /></div>
        <div class="fg"><label>Départ</label><input type="time" id="m-depart" oninput="calcDuree()" /></div>
      </div>
      <div id="duree-pill-wrap"></div>
      <hr class="divider">
      <div class="section-label">Descriptif <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb;font-size:11px;">(optionnel)</span></div>
      <div class="field-row single">
        <div class="fg"><textarea id="m-desc" placeholder="Nature de l'intervention, matériel, remarques..."></textarea></div>
      </div>
      <div id="modal-msg"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-save" onclick="saveEvent()"><i class="ti ti-check"></i> Enregistrer</button>
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-del" id="btn-del" style="display:none;" onclick="deleteEvent()"><i class="ti ti-trash"></i> Supprimer</button>
    </div>
  </div>
</div>

<script>
const SK='ae_agenda_v7';
const COLORS=['c0','c1','c2','c3','c4','c5'];
const COLORS_COUNT=6;

function load(){try{return JSON.parse(localStorage.getItem(SK))||[];}catch(e){return[];}}
function save(d){localStorage.setItem(SK,JSON.stringify(d));}

// Assigner une couleur stable par client (hash du nom)
function clientColor(nom){
  let h=0;for(let i=0;i<nom.length;i++)h=(h*31+nom.charCodeAt(i))%COLORS_COUNT;
  return COLORS[h];
}

const JOURS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MOIS_COURT=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
let curYear=new Date().getFullYear(),curMonth=new Date().getMonth(),curDay=new Date().getDate();
let editId=null,editDate=null,curView='month';

function pad(n){return String(n).padStart(2,'0');}
function curDayStr(){return `${curYear}-${pad(curMonth+1)}-${pad(curDay)}`;}
function timeToMin(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;}

function calcDuree(){
  const a=timeToMin(document.getElementById('m-arrivee').value);
  const d=timeToMin(document.getElementById('m-depart').value);
  const tarif=parseFloat(document.getElementById('m-tarif').value);
  const wrap=document.getElementById('duree-pill-wrap');
  if(a!==null&&d!==null&&d>a){
    const mins=d-a,h=Math.floor(mins/60),m=mins%60;
    let txt=`${h>0?h+'h':''}${m>0?(m<10?'0'+m:m)+'min':''}`;
    let mt=(!isNaN(tarif)&&tarif>0)?` · ${(mins/60*tarif).toFixed(2)} €`:'';
    wrap.innerHTML=`<div class="duree-pill"><i class="ti ti-clock" style="font-size:15px;"></i> ${txt}${mt}</div>`;
  } else wrap.innerHTML='';
}

function setView(v){
  curView=v;
  ['month','day','year'].forEach(n=>{
    document.getElementById('view-'+n).style.display=v===n?'':'none';
    document.getElementById('vt-'+n).classList.toggle('active',v===n);
  });
  render();
}

function navPrev(){
  if(curView==='month'){curMonth--;if(curMonth<0){curMonth=11;curYear--;}}
  else if(curView==='day'){const d=new Date(curYear,curMonth,curDay-1);curYear=d.getFullYear();curMonth=d.getMonth();curDay=d.getDate();}
  else curYear--;
  render();
}
function navNext(){
  if(curView==='month'){curMonth++;if(curMonth>11){curMonth=0;curYear++;}}
  else if(curView==='day'){const d=new Date(curYear,curMonth,curDay+1);curYear=d.getFullYear();curMonth=d.getMonth();curDay=d.getDate();}
  else curYear++;
  render();
}
function render(){if(curView==='month')renderMonth();else if(curView==='day')renderDay();else renderYear();}

/* ---- MONTH ---- */
function renderMonth(){
  document.getElementById('period-title').textContent=MOIS[curMonth]+' '+curYear;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  JOURS.forEach(j=>{const h=document.createElement('div');h.className='day-hdr';h.textContent=j;grid.appendChild(h);});
  const first=new Date(curYear,curMonth,1);
  let sd=first.getDay();sd=sd===0?6:sd-1;
  const dim=new Date(curYear,curMonth+1,0).getDate();
  const dip=new Date(curYear,curMonth,0).getDate();
  const today=new Date();
  const data=load();
  let cells=[];
  for(let i=0;i<sd;i++) cells.push({day:dip-sd+1+i,month:curMonth-1,year:curMonth===0?curYear-1:curYear,other:true});
  for(let i=1;i<=dim;i++) cells.push({day:i,month:curMonth,year:curYear,other:false});
  while(cells.length%7!==0){const idx=cells.length-dim-sd+1;cells.push({day:idx,month:curMonth+1,year:curMonth===11?curYear+1:curYear,other:true});}
  cells.forEach(c=>{
    const ds=`${c.year}-${pad(c.month+1)}-${pad(c.day)}`;
    const isToday=!c.other&&c.day===today.getDate()&&c.month===today.getMonth()&&c.year===today.getFullYear();
    const cell=document.createElement('div');
    cell.className='day-cell'+(c.other?' other-month':'')+(isToday?' today':'');
    cell.onclick=()=>{curDay=c.day;curMonth=c.month;curYear=c.year;setView('day');};
    const num=document.createElement('div');num.className='day-num';num.textContent=c.day;cell.appendChild(num);
    data.filter(e=>e.date===ds).forEach(e=>{
      const cc=clientColor(e.nom);
      const pill=document.createElement('div');
      pill.className=`event-pill ${cc}-pill`;
      pill.textContent=`${e.arrivee}–${e.depart} ${e.nom}`;
      pill.onclick=(ev)=>{ev.stopPropagation();openEdit(e);};
      cell.appendChild(pill);
    });
    grid.appendChild(cell);
  });
  renderMonthStats();
}

function renderMonthStats(){
  const prefix=`${curYear}-${pad(curMonth+1)}`;
  const data=load().filter(e=>e.date.startsWith(prefix));
  const {mins,montant}=calcTotals(data);
  const h=Math.floor(mins/60),m=mins%60;
  document.getElementById('stats-row').innerHTML=statHTML(data.length,h,m,montant);
}

function calcTotals(data){
  const mins=data.reduce((s,e)=>{const a=timeToMin(e.arrivee),d=timeToMin(e.depart);return s+(d&&a&&d>a?d-a:0);},0);
  const montant=data.reduce((s,e)=>{const a=timeToMin(e.arrivee),d=timeToMin(e.depart);return s+(d&&a&&d>a?(d-a)/60*e.tarif:0);},0);
  return{mins,montant};
}
function statHTML(n,h,m,montant){
  return `<div class="stat"><div class="stat-lbl">Interventions</div><div class="stat-val">${n}</div></div>
    <div class="stat"><div class="stat-lbl">Heures</div><div class="stat-val">${h}h${m>0?pad(m):''}</div></div>
    <div class="stat"><div class="stat-lbl">Montant</div><div class="stat-val">${montant.toFixed(2)} €</div></div>`;
}

/* ---- DAY ---- */
function renderDay(){
  const ds=curDayStr();
  const d=new Date(ds+'T12:00:00');
  document.getElementById('period-title').textContent=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('dv-date').textContent=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const data=load().filter(e=>e.date===ds).sort((a,b)=>a.arrivee.localeCompare(b.arrivee));
  const grid=document.getElementById('time-grid');grid.innerHTML='';
  const START=7,END=21;
  const now=new Date();
  const isToday=now.getFullYear()===curYear&&now.getMonth()===curMonth&&now.getDate()===curDay;
  const nowMin=isToday?now.getHours()*60+now.getMinutes():null;

  if(data.length===0){
    const empty=document.createElement('div');empty.className='no-events';
    empty.innerHTML='<i class="ti ti-calendar-off" style="font-size:32px;display:block;margin-bottom:8px;"></i>Aucune intervention ce jour<br><small style="color:#ccc;">Cliquez sur + Ajouter pour en créer une</small>';
    grid.appendChild(empty);
  } else {
    for(let h=START;h<=END;h++){
      const evts=data.filter(e=>{const a=timeToMin(e.arrivee);return a>=h*60&&a<(h+1)*60;});
      if(evts.length===0&&data.every(e=>{const a=timeToMin(e.arrivee),d2=timeToMin(e.depart);return !(a<(h+1)*60&&d2>h*60);})) {
        // heure vide mais on l'affiche quand même si proche d'un event
        const hasNearby=data.some(e=>{const a=timeToMin(e.arrivee),d2=timeToMin(e.depart);return Math.abs(a-h*60)<120||Math.abs(d2-h*60)<120;});
        if(!hasNearby) continue;
      }
      const row=document.createElement('div');row.className='time-row';
      const lbl=document.createElement('div');lbl.className='time-label';lbl.textContent=pad(h)+':00';row.appendChild(lbl);
      const slot=document.createElement('div');slot.className='time-slot';
      slot.onclick=()=>{openModal(ds);setTimeout(()=>{document.getElementById('m-arrivee').value=pad(h)+':00';document.getElementById('m-depart').value=pad(h+1)+':00';calcDuree();},50);};
      evts.forEach(e=>{
        const cc=clientColor(e.nom);
        const mins2=timeToMin(e.depart)-timeToMin(e.arrivee);
        const dur=`${Math.floor(mins2/60)>0?Math.floor(mins2/60)+'h':''}${mins2%60>0?(mins2%60)+'min':''}`;
        const block=document.createElement('div');
        block.className=`time-block ${cc}`;
        block.innerHTML=`<div class="tb-name">${e.nom}</div><div class="tb-time"><i class="ti ti-clock" style="font-size:11px;"></i> ${e.arrivee} → ${e.depart} (${dur}) · ${(e.duree*e.tarif).toFixed(2)} €</div>${e.desc?`<div class="tb-desc">${e.desc}</div>`:''}`;
        block.onclick=(ev)=>{ev.stopPropagation();openEdit(e);};
        slot.appendChild(block);
      });
      if(nowMin!==null&&nowMin>=h*60&&nowMin<(h+1)*60){
        const pct=((nowMin-h*60)/60)*100;
        const line=document.createElement('div');line.className='time-now-line';line.style.top=pct+'%';row.appendChild(line);
      }
      row.appendChild(slot);grid.appendChild(row);
    }
  }
  const{mins,montant}=calcTotals(data);
  const hh=Math.floor(mins/60),mm2=mins%60;
  document.getElementById('day-stats-row').innerHTML=statHTML(data.length,hh,mm2,montant);
}

/* ---- YEAR ---- */
function renderYear(){
  document.getElementById('period-title').textContent='Année '+curYear;
  const data=load().filter(e=>e.date.startsWith(String(curYear)));
  const{mins,montant}=calcTotals(data);
  const h=Math.floor(mins/60),m=mins%60;
  document.getElementById('year-stats').innerHTML=`
    <div class="stat"><div class="stat-lbl">Interventions</div><div class="stat-val">${data.length}</div></div>
    <div class="stat"><div class="stat-lbl">Heures</div><div class="stat-val">${h}h${m>0?pad(m):''}</div></div>
    <div class="stat"><div class="stat-lbl">Montant annuel</div><div class="stat-val">${montant.toFixed(2)} €</div></div>`;
  const yg=document.getElementById('year-grid');yg.innerHTML='';
  const today=new Date();
  for(let mo=0;mo<12;mo++){
    const prefix=`${curYear}-${pad(mo+1)}`;
    const mData=data.filter(e=>e.date.startsWith(prefix));
    const eventMap={};
    mData.forEach(e=>{if(!eventMap[e.date])eventMap[e.date]=e.nom;});
    const mm=document.createElement('div');mm.className='mini-month';
    const mt=document.createElement('div');mt.className='mini-month-title';
    mt.textContent=MOIS_COURT[mo];
    mt.onclick=()=>{curMonth=mo;setView('month');};
    mm.appendChild(mt);
    const mg=document.createElement('div');mg.className='mini-grid';
    JOURS.forEach(j=>{const hd=document.createElement('div');hd.className='mini-hdr';hd.textContent=j[0];mg.appendChild(hd);});
    const first=new Date(curYear,mo,1);let sd=first.getDay();sd=sd===0?6:sd-1;
    const dim=new Date(curYear,mo+1,0).getDate();
    const dip=new Date(curYear,mo,0).getDate();
    for(let i=0;i<sd;i++){const d2=document.createElement('div');d2.className='mini-day other';d2.textContent=dip-sd+1+i;mg.appendChild(d2);}
    for(let i=1;i<=dim;i++){
      const ds=`${curYear}-${pad(mo+1)}-${pad(i)}`;
      const isToday=i===today.getDate()&&mo===today.getMonth()&&curYear===today.getFullYear();
      const firstNom=eventMap[ds];
      const cc=firstNom?clientColor(firstNom):'';
      const d2=document.createElement('div');
      d2.className='mini-day'+(isToday?' today-d':'')+(firstNom&&!isToday?` has-event h${cc}`:'');
      d2.textContent=i;
      d2.onclick=()=>{curMonth=mo;curDay=i;setView('day');};
      mg.appendChild(d2);
    }
    mm.appendChild(mg);
    const mMontant=mData.reduce((s,e)=>{const a=timeToMin(e.arrivee),d2=timeToMin(e.depart);return s+(d2&&a&&d2>a?(d2-a)/60*e.tarif:0);},0);
    const mf=document.createElement('div');mf.className='mini-foot';
    mf.textContent=mData.length>0?`${mData.length} interv. · ${mMontant.toFixed(0)} €`:'—';
    mm.appendChild(mf);yg.appendChild(mm);
  }
}

/* ---- MODAL ---- */
function openModal(dateStr){
  editId=null;editDate=dateStr;
  const d=new Date(dateStr+'T12:00:00');
  document.getElementById('modal-weekday').textContent=d.toLocaleDateString('fr-FR',{weekday:'long'});
  document.getElementById('modal-datestr').textContent=d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  ['m-nom','m-adresse','m-arrivee','m-depart','m-tarif','m-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('duree-pill-wrap').innerHTML='';
  document.getElementById('modal-msg').innerHTML='';
  document.getElementById('btn-del').style.display='none';
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-nom').focus(),100);
}

function openEdit(e){
  editId=e.id;editDate=e.date;
  const d=new Date(e.date+'T12:00:00');
  document.getElementById('modal-weekday').textContent=d.toLocaleDateString('fr-FR',{weekday:'long'});
  document.getElementById('modal-datestr').textContent=d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('m-nom').value=e.nom;
  document.getElementById('m-adresse').value=e.adresse;
  document.getElementById('m-arrivee').value=e.arrivee;
  document.getElementById('m-depart').value=e.depart;
  document.getElementById('m-tarif').value=e.tarif;
  document.getElementById('m-desc').value=e.desc||'';
  document.getElementById('modal-msg').innerHTML='';
  document.getElementById('btn-del').style.display='';
  calcDuree();
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){document.getElementById('overlay').classList.remove('open');editId=null;editDate=null;}

function saveEvent(){
  const nom=document.getElementById('m-nom').value.trim();
  const adresse=document.getElementById('m-adresse').value.trim();
  const arrivee=document.getElementById('m-arrivee').value;
  const depart=document.getElementById('m-depart').value;
  const tarif=parseFloat(document.getElementById('m-tarif').value);
  const desc=document.getElementById('m-desc').value.trim();
  const msg=document.getElementById('modal-msg');
  const a=timeToMin(arrivee),d=timeToMin(depart);
  if(!nom||!adresse||!arrivee||!depart||isNaN(tarif)){msg.innerHTML='<div class="err">Merci de remplir tous les champs obligatoires.</div>';return;}
  if(d<=a){msg.innerHTML='<div class="err">L\'heure de départ doit être après l\'arrivée.</div>';return;}
  const duree=(d-a)/60;
  let data=load();
  if(editId){data=data.map(e=>e.id===editId?{...e,nom,adresse,arrivee,depart,duree,tarif,desc}:e);}
  else{data.push({id:Date.now(),date:editDate,nom,adresse,arrivee,depart,duree,tarif,desc});}
  save(data);closeModal();render();
}

function deleteEvent(){
  if(!confirm('Supprimer cette intervention ?')) return;
  save(load().filter(e=>e.id!==editId));
  closeModal();render();
}

/* ---- EXPORT / IMPORT JSON ---- */
function exportJSON(){
  const data=load();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().split('T')[0];
  a.href=url;a.download=`agenda-sauvegarde-${date}.json`;a.click();
  URL.revokeObjectURL(url);
}

function importJSON(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error();
      if(!confirm(`Importer ${data.length} intervention(s) ? Les données existantes seront fusionnées (pas supprimées).`)) return;
      // Fusion : on garde les existants + on ajoute les nouveaux (pas de doublon par id)
      const existing=load();
      const existingIds=new Set(existing.map(e=>e.id));
      const toAdd=data.filter(e=>!existingIds.has(e.id));
      save([...existing,...toAdd]);
      render();
      alert(`✅ ${toAdd.length} intervention(s) importée(s).`);
    } catch(err){alert('❌ Fichier invalide.');}
  };
  reader.readAsText(file);
  event.target.value='';
}

/* ---- EXPORT CSV ---- */
function exportCSV(){
  let data=load();
  if(curView==='month'){const prefix=`${curYear}-${pad(curMonth+1)}`;data=data.filter(e=>e.date.startsWith(prefix));}
  else if(curView==='day'){data=data.filter(e=>e.date===curDayStr());}
  else data=data.filter(e=>e.date.startsWith(String(curYear)));
  data.sort((a,b)=>a.date.localeCompare(b.date)||a.arrivee.localeCompare(b.arrivee));
  const header='Date;Nom;Adresse;Arrivée;Départ;Durée (h);Tarif (€/h);Montant (€);Descriptif';
  const rows=data.map(e=>{
    const dl=new Date(e.date+'T12:00:00').toLocaleDateString('fr-FR');
    return `${dl};${e.nom};${e.adresse};${e.arrivee};${e.depart};${e.duree.toFixed(2)};${e.tarif};${(e.duree*e.tarif).toFixed(2)};${(e.desc||'').replace(/;/g,',')}`;
  });
  const csv='\uFEFF'+[header,...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const label=curView==='month'?`${curYear}-${pad(curMonth+1)}`:curView==='day'?curDayStr():curYear;
  a.href=url;a.download=`interventions-${label}.csv`;a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script>
