<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synalojik – Agenda</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2490">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Synalojik">
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bleu:#1a3ed4;--bleu-fonce:#0f2490;--rouge:#d41a1a;--rouge-clair:#ff2a2a;
  --noir:#0a0a14;--surface:#fff;--bg:#f0f2f8;--border:#dde2f0;
  --text:#1a1a2e;--muted:#6b7280;--radius:10px;--shadow:0 2px 12px rgba(26,62,212,.10);
  --row-h:80px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{background:linear-gradient(135deg,var(--noir),var(--bleu-fonce));padding:10px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 15px rgba(0,0,0,.4);position:sticky;top:0;z-index:100;}
.hlogo{display:flex;align-items:center;gap:10px;}
.hlogo img{height:48px;filter:drop-shadow(0 0 8px rgba(212,26,26,.5));}
.htitle{display:flex;flex-direction:column;}
.htitle span:first-child{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;letter-spacing:2px;text-transform:uppercase;}
.htitle span:last-child{font-size:0.65rem;color:rgba(255,255,255,.6);letter-spacing:1px;text-transform:uppercase;}
.hright{display:flex;align-items:center;gap:8px;}
#statut{font-size:.75rem;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:5px;}
#statut .dot{width:8px;height:8px;border-radius:50%;background:#666;flex-shrink:0;}
#statut.ok{color:#4ade80;}
#statut.ok .dot{background:#4ade80;box-shadow:0 0 6px #4ade80;}
#btn-cx{background:linear-gradient(135deg,var(--rouge),var(--rouge-clair));color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;}

/* TOOLBAR */
.toolbar{max-width:1100px;margin:12px auto 0;padding:0 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.nav-left{display:flex;align-items:center;gap:6px;}
.btn-nav{background:var(--surface);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.btn-nav:hover{background:#eef1ff;}
.btn-today{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:500;}
.btn-today:hover{background:#eef1ff;}
#titre-periode{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:var(--text);letter-spacing:1px;text-transform:uppercase;min-width:140px;}
.view-btns{display:flex;gap:4px;}
.view-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all .15s;}
.view-btn.active{background:linear-gradient(135deg,var(--bleu-fonce),var(--bleu));color:#fff;border-color:var(--bleu);}
#btn-export{background:linear-gradient(135deg,var(--rouge),var(--rouge-clair));color:#fff;border:none;padding:7px 12px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;}

/* STATS */
.stats{max-width:1100px;margin:10px auto;padding:0 12px;display:flex;gap:10px;}
.stat-card{flex:1;background:#fff;border-radius:var(--radius);padding:10px 16px;box-shadow:var(--shadow);border-left:4px solid var(--bleu);}
.stat-card.rouge{border-left-color:var(--rouge);}
.stat-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:2px;}
.stat-value{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--text);}

/* VUE MOIS */
.cal-wrapper{max-width:1100px;margin:0 auto 20px;padding:0 12px;}
.cal-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.cal-day-names{display:grid;grid-template-columns:repeat(7,1fr);background:linear-gradient(135deg,var(--bleu-fonce),var(--bleu));}
.cal-day-names div{text-align:center;font-size:.72rem;font-weight:600;color:rgba(255,255,255,.85);padding:8px 0;letter-spacing:1px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:75px;max-height:75px;overflow:hidden;padding:3px;cursor:pointer;position:relative;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell:hover{background:#f0f4ff;}
.cal-cell.autre-mois{background:#fafafa;}
.cal-cell.autre-mois .num-jour{color:#ccc;}
.cal-cell.today{background:linear-gradient(135deg,#eef1ff,#f5f0ff);border-left:3px solid var(--bleu);}
.cal-cell.today .num-jour{background:linear-gradient(135deg,var(--bleu),var(--rouge));color:#fff;border-radius:50%;}
.num-jour{font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:2px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ev-chip{display:block;font-size:.6rem;font-weight:600;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:linear-gradient(135deg,var(--bleu),#3a5ef0);color:#fff;height:15px;line-height:15px;max-width:100%;}
.ev-plus{font-size:.6rem;color:var(--bleu);font-weight:600;padding-left:2px;white-space:nowrap;}

/* GRILLE HORAIRE */
.grid-wrapper{max-width:1100px;margin:0 auto 20px;padding:0 12px;overflow-x:auto;}
.time-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);min-width:320px;}
.tg-header{display:grid;border-bottom:2px solid var(--border);}
.tg-hcell{background:linear-gradient(135deg,var(--bleu-fonce),var(--bleu));color:#fff;text-align:center;padding:8px 4px;font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.tg-hcell.timecol{background:#f8f9ff;color:var(--muted);font-size:.7rem;border-right:1px solid var(--border);}
.tg-hcell.today-col{background:linear-gradient(135deg,var(--rouge),var(--rouge-clair));}

/* Lignes : 1 ligne = 1 heure (80px), trait demi-heure en pointillé via pseudo-élément */
.tg-row{display:grid;border-bottom:1px solid var(--border);height:var(--row-h);position:relative;}
/* Label heure : centré verticalement sur le trait supérieur (transform -50%) */
.time-label{
  font-size:.68rem;color:var(--muted);background:#f8f9ff;
  border-right:1px solid var(--border);
  position:relative;
}
.time-label span{
  position:absolute;
  top:0;right:6px;
  transform:translateY(-50%);
  line-height:1;
  white-space:nowrap;
}
/* Trait demi-heure en pointillé au milieu de chaque ligne */
.tg-row::after{
  content:'';
  position:absolute;
  left:0;right:0;
  top:50%;
  border-top:1px dashed #e5e7f0;
  pointer-events:none;
}
/* Colonnes jours : position relative pour y placer les événements en absolu */
.tg-col-body{position:relative;}
.tg-cell{border-right:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative;}
.tg-cell:last-child{border-right:none;}
.tg-cell:hover{background:#f0f4ff;}
.tg-cell.today-cell{background:#fafbff;}
/* Événement en position absolue, hauteur calculée selon durée */
.tg-ev{
  font-size:.7rem;font-weight:600;padding:2px 5px;border-radius:3px;
  background:linear-gradient(135deg,var(--bleu),#3a5ef0);color:#fff;
  cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  position:absolute;left:1px;right:1px;
  z-index:2;box-sizing:border-box;
}
.tg-ev:hover{opacity:.85;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-start;justify-content:center;padding:16px 10px;overflow-y:auto;}
.overlay.visible{display:flex;}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:520px;box-shadow:0 8px 40px rgba(0,0,0,.3);overflow:hidden;animation:slideDown .2s ease;margin:auto;}
@keyframes slideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{background:linear-gradient(135deg,var(--noir),var(--bleu-fonce));padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.modal-header h2{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase;}
.modal-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:16px;}

/* Liste */
.day-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.day-item{background:#f5f7ff;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;transition:all .15s;}
.day-item:hover{border-color:var(--bleu);background:#eef1ff;}
.day-item-left{display:flex;flex-direction:column;gap:2px;min-width:0;}
.day-item-client{font-weight:600;font-size:.9rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day-item-detail{font-size:.75rem;color:var(--muted);}
.day-item-tarif{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:var(--bleu);white-space:nowrap;flex-shrink:0;}
.btn-nouvelle{width:100%;background:linear-gradient(135deg,var(--bleu-fonce),var(--bleu));color:#fff;border:none;padding:10px;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;margin-top:4px;}

/* Formulaire */
.form-field{margin-bottom:8px;}
.form-field label{display:block;font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.form-field input,.form-field textarea{width:100%;padding:9px 12px;font-size:.88rem;font-family:'Inter',sans-serif;border:1.5px solid var(--border);border-radius:7px;color:var(--text);background:#fff;outline:none;-webkit-appearance:none;opacity:1;text-transform:uppercase;}
.form-field input[type="date"],.form-field input[type="number"]{text-transform:none;}
.form-field input[type="time"]{text-transform:none;}
.form-field input:focus,.form-field textarea:focus{border-color:var(--bleu);}
.form-field textarea{resize:vertical;min-height:55px;text-transform:uppercase;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;}
.btn-ajouter{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;padding:11px;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.btn-modifier{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;border:none;padding:11px;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.btn-supprimer{background:linear-gradient(135deg,var(--rouge),var(--rouge-clair));color:#fff;border:none;padding:11px;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.btn-retour{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:7px;cursor:pointer;font-size:.8rem;margin-bottom:10px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;}

@media(max-width:600px){
  .htitle span:first-child{font-size:1rem;}
  .hlogo img{height:40px;}
  #statut span:not(.dot){display:none;}
  .form-row-2{grid-template-columns:1fr;}
  .btn-row{grid-template-columns:1fr;}
  #titre-periode{font-size:.95rem;min-width:80px;}
  .view-btn{padding:5px 7px;font-size:.72rem;}
}
</style>
</head>

    <button class="view-btn active" onclick="changerVue('mois')" id="vbtn-mois">Mois</button>
    <button class="view-btn" onclick="changerVue('semaine')" id="vbtn-semaine">Semaine</button>
    <button class="view-btn" onclick="changerVue('jour')" id="vbtn-jour">Jour</button>
  </div>
  <button id="btn-export" onclick="exportCSVMois()">⬇ CSV</button>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-label">Interventions ce mois</div><div class="stat-value" id="stat-count">0</div></div>
  <div class="stat-card rouge"><div class="stat-label">Total mensuel</div><div class="stat-value" id="stat-total">0 €</div></div>
</div>

<div id="vue-container"></div>

<!-- MODAL LISTE -->
<div class="overlay" id="overlayListe">
  <div class="modal">
    <div class="modal-header">
      <h2 id="listeTitre">Interventions</h2>
      <button class="modal-close" onclick="fermerListe()">✕</button>
    </div>
    <div class="modal-body">
      <div class="day-list" id="dayList"></div>
      <button class="btn-nouvelle" onclick="ouvrirFormulaire(null,jourEnCours,null,false)">+ Nouvelle intervention</button>
    </div>
  </div>
</div>

<!-- MODAL FORMULAIRE -->
<div class="overlay" id="overlayForm">
  <div class="modal">
    <div class="modal-header">
      <h2 id="formTitre">Intervention</h2>
      <button class="modal-close" onclick="fermerForm()">✕</button>
    </div>
    <div class="modal-body">
      <button class="btn-retour" id="btn-retour" onclick="retourListe()" style="display:none;">← Retour</button>
      <div class="form-row-2">
        <div class="form-field"><label>Date</label><input type="date" id="f-date"></div>
        <div class="form-field"><label>Heure début</label><input type="time" id="f-debut" step="1800"></div>
      </div>
      <div class="form-row-2">
        <div class="form-field"><label>Heure fin</label><input type="time" id="f-fin" step="1800"></div>
        <div class="form-field"><label>Client</label><input type="text" id="f-client" placeholder="Nom du client"></div>
      </div>
      <div class="form-field"><label>Adresse</label><input type="text" id="f-adresse" placeholder="Adresse"></div>
      <div class="form-field"><label>Descriptif</label><textarea id="f-descriptif" placeholder="Description"></textarea></div>
      <div class="form-row-2">
        <div class="form-field"><label>Donneur d'ordre</label><input type="text" id="f-donneur" placeholder="Donneur d'ordre"></div>
        <div class="form-field"><label>N° intervention</label><input type="text" id="f-numero" placeholder="Référence"></div>
      </div>
      <div class="form-field"><label>Tarif (€)</label><input type="number" id="f-tarif" placeholder="0.00" step="0.01"></div>
      <div class="btn-row">
        <button class="btn-ajouter" onclick="ajouterIntervention()">✔ Ajouter</button>
        <button class="btn-modifier" onclick="modifierIntervention()">✏ Modifier</button>
        <button class="btn-supprimer" onclick="supprimerIntervention()">🗑 Supprimer</button>
      </div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID='857421313712-ge30q9selkt0s0t0dpa26g7c5l5oqbah.apps.googleusercontent.com';
const API_KEY='AIzaSyBcCfAhpT7_eGXkc07fdBEViaHJHhmNCNA';
const SCOPES='https://www.googleapis.com/auth/drive.file';
let FILE_ID=null,tokenClient,accessToken=null;
let interventions=[],currentDate=new Date(),vue='mois',editIdx=null,jourEnCours=null;
const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const JOURS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

// ---- AUTH ----
window.addEventListener('load',()=>{
  const local=localStorage.getItem('synalojik_v2');
  if(local){interventions=JSON.parse(local);render();}
  gapi.load('client',async()=>{
    await gapi.client.init({apiKey:API_KEY,discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,scope:SCOPES,
      callback:async(resp)=>{
        if(resp.error)return;
        accessToken=resp.access_token;
        const s=document.getElementById('statut');
        s.className='ok';s.innerHTML='<span class="dot"></span><span>Connecté</span>';
        document.getElementById('btn-cx').textContent='Déconnexion';
        document.getElementById('btn-cx').onclick=deconnecter;
        await chargerDrive();render();
      }
    });
    tokenClient.requestAccessToken({prompt:''});
  });
});
function demanderConnexion(){tokenClient.requestAccessToken({prompt:'consent'});}
function deconnecter(){
  google.accounts.oauth2.revoke(accessToken,()=>{
    accessToken=null;
    document.getElementById('statut').className='';
    document.getElementById('statut').innerHTML='<span class="dot"></span><span>Non connecté</span>';
    document.getElementById('btn-cx').textContent='Connexion';
    document.getElementById('btn-cx').onclick=demanderConnexion;
  });
}

// ---- DRIVE ----
async function obtenirFileId(){
  const r=await gapi.client.drive.files.list({q:"name='journal.json' and trashed=false",fields:'files(id)',spaces:'drive'});
  const f=r.result.files;
  if(f&&f.length>0){FILE_ID=f[0].id;return;}
  const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',headers:{'Authorization':'Bearer '+accessToken},
    body:(()=>{const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name:'journal.json',mimeType:'application/json'})],{type:'application/json'}));form.append('file',new Blob(['[]'],{type:'application/json'}));return form;})()
  });
  FILE_ID=(await res.json()).id;
}
async function chargerDrive(){
  try{
    await obtenirFileId();
    const r=await gapi.client.drive.files.get({fileId:FILE_ID,alt:'media'});
    const driveData=JSON.parse(r.body||'[]');
    // IDs supprimés sur d'autres appareils — ne pas les réinjecter
    const deleted=JSON.parse(localStorage.getItem('synalojik_deleted')||'[]');
    // Entrées locales ajoutées hors ligne (absentes du Drive et non supprimées)
    const localData=JSON.parse(localStorage.getItem('synalojik_v2')||'[]');
    const driveIds=new Set(driveData.map(i=>i.id));
    const deletedIds=new Set(deleted);
    const localOnly=localData.filter(i=>!driveIds.has(i.id)&&!deletedIds.has(i.id));
    interventions=[...driveData,...localOnly];
    // Nettoyer les tombstones déjà absents du Drive (inutiles désormais)
    localStorage.setItem('synalojik_deleted','[]');
    if(localOnly.length>0)await sauvegarder();
    localStorage.setItem('synalojik_v2',JSON.stringify(interventions));
  }catch(e){const l=localStorage.getItem('synalojik_v2');interventions=l?JSON.parse(l):[];}
}
}
async function sauvegarder(){
  localStorage.setItem('synalojik_v2',JSON.stringify(interventions));
  if(!accessToken){afficherStatutSauvegarde('local');return;}
  try{
    if(!FILE_ID)await obtenirFileId();
    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify({name:'journal.json',mimeType:'application/json'})],{type:'application/json'}));
    form.append('file',new Blob([JSON.stringify(interventions)],{type:'application/json'}));
    const res=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+FILE_ID+'?uploadType=multipart',{method:'PATCH',headers:{'Authorization':'Bearer '+accessToken},body:form});
    if(res.ok){afficherStatutSauvegarde('ok');}
    else{afficherStatutSauvegarde('erreur');console.error('Drive error',res.status);}
  }catch(e){afficherStatutSauvegarde('erreur');console.error(e);}
}
function afficherStatutSauvegarde(etat){
  const s=document.getElementById('statut');
  if(etat==='ok'){
    s.className='ok';s.innerHTML='<span class="dot"></span><span>Sauvegardé ✓</span>';
    setTimeout(()=>{s.innerHTML='<span class="dot"></span><span>Connecté</span>';},2000);
  } else if(etat==='erreur'){
    s.className='';s.innerHTML='<span class="dot" style="background:#f59e0b"></span><span style="color:#f59e0b">Erreur sauvegarde !</span>';
  } else {
    s.className='';s.innerHTML='<span class="dot"></span><span>Sauvegardé en local</span>';
  }
}

// ---- UTILS ----
function fmtISO(date){return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');}
function fmtFR(date){return date.toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
function fmtH(h){return String(h).padStart(2,'0')+':00';}
function fmtH30(h){return String(h).padStart(2,'0')+':30';}
function lundi(date){const d=new Date(date);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d;}

// ---- NAVIGATION ----
function naviguer(delta){
  if(vue==='mois'){currentDate.setMonth(currentDate.getMonth()+delta);}
  else if(vue==='semaine'){currentDate.setDate(currentDate.getDate()+delta*7);}
  else{currentDate.setDate(currentDate.getDate()+delta);}
  render();
}
function allerAujourdhui(){currentDate=new Date();render();}
function changerVue(v){
  vue=v;
  ['mois','semaine','jour'].forEach(x=>document.getElementById('vbtn-'+x).classList.toggle('active',x===v));
  render();
}

// ---- SWIPE ----
let swipeStartX=0;
document.addEventListener('touchstart',e=>{swipeStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const diff=swipeStartX-e.changedTouches[0].clientX;
  if(Math.abs(diff)>60){naviguer(diff>0?1:-1);}
},{passive:true});

// ---- RENDER ----
function render(){updateStats();if(vue==='mois')renderMois();else if(vue==='semaine')renderSemaine();else renderJour();}

// ---- VUE MOIS ----
function renderMois(){
  const year=currentDate.getFullYear(),month=currentDate.getMonth();
  document.getElementById('titre-periode').textContent=MOIS[month]+' '+year;
  const startDay=(new Date(year,month,1).getDay()+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const total=Math.ceil((startDay+daysInMonth)/7)*7;
  const todayISO=fmtISO(new Date());
  let html='<div class="cal-wrapper"><div class="cal-grid"><div class="cal-day-names">';
  JOURS.forEach(j=>{html+='<div>'+j+'</div>';});
  html+='</div><div class="cal-body">';
  for(let i=0;i<total;i++){
    const date=new Date(year,month,1+i-startDay);
    const ds=fmtISO(date);
    const isThisMonth=date.getMonth()===month;
    const isToday=ds===todayISO;
    // Clic → vue jour de ce jour
    html+='<div class="cal-cell'+((!isThisMonth)?' autre-mois':'')+(isToday?' today':'')+'" onclick="allerJour(\''+ds+'\')">';
    html+='<div class="num-jour">'+date.getDate()+'</div>';
    const evs=interventions.filter(e=>e.date===ds);
    evs.slice(0,2).forEach(ev=>{html+='<div class="ev-chip">'+( ev.debut?ev.debut+' ':'')+( ev.client||'')+'</div>';});
    if(evs.length>2)html+='<div class="ev-plus">+'+( evs.length-2)+'</div>';
    html+='</div>';
  }
  html+='</div></div></div>';
  document.getElementById('vue-container').innerHTML=html;
}

// Clic jour en vue mois → bascule vue jour
function allerJour(ds){
  currentDate=new Date(ds+'T12:00:00');
  changerVue('jour');
}

// ---- GRILLE HORAIRE (semaine & jour) ----
// Convertit "HH:MM" en minutes depuis minuit
function toMin(hhmm){
  if(!hhmm)return null;
  const p=hhmm.split(':');
  return parseInt(p[0],10)*60+(parseInt(p[1],10)||0);
}

function buildGrille(cols, getColHeader, getColClass, nbCols, colWidth){
  const ROW_H=80; // px par heure — doit correspondre à --row-h
  const todayISO=fmtISO(new Date());
  let html='<div class="grid-wrapper"><div class="time-grid">';

  // ---- Header ----
  html+='<div class="tg-header" style="display:grid;grid-template-columns:'+colWidth+' repeat('+nbCols+',1fr);">';
  html+='<div class="tg-hcell timecol"></div>';
  cols.forEach((c,i)=>{html+='<div class="tg-hcell '+getColClass(c,i)+'">'+getColHeader(c,i)+'</div>';});
  html+='</div>';

  // ---- Corps : wrapper position:relative pour les événements absolus ----
  html+='<div style="display:grid;grid-template-columns:'+colWidth+' repeat('+nbCols+',1fr);position:relative;">';

  // --- Colonne des heures ---
  html+='<div>';
  for(let h=0;h<24;h++){
    html+='<div class="tg-row" style="grid-template-columns:unset;">';
    html+='<div class="time-label" style="height:'+ROW_H+'px;"><span>'+fmtH(h)+'</span></div>';
    html+='</div>';
  }
  html+='</div>';

  // --- Colonnes jours ---
  cols.forEach((c,i)=>{
    const ds=typeof c==='string'?c:fmtISO(c);
    const isToday=ds===todayISO;
    const evsDuJour=interventions.filter(e=>e.date===ds);

    html+='<div class="tg-col-body" style="position:relative;">';

    // Lignes de fond (24 rangées cliquables)
    for(let h=0;h<24;h++){
      html+='<div class="tg-row" style="grid-template-columns:unset;">';
      html+='<div class="tg-cell'+(isToday?' today-cell':'')+'"'
        +' style="height:'+ROW_H+'px;border-right:none;"'
        +' onclick="ouvrirFormulaire(null,\''+ds+'\',\''+fmtH(h)+'\',false)"></div>';
      html+='</div>';
    }

    // Événements en position absolue
    evsDuJour.forEach(ev=>{
      const startMin=toMin(ev.debut);
      const endMin=toMin(ev.fin);
      if(startMin===null)return;
      const topPx=(startMin/60)*ROW_H;
      const durationMin=(endMin!==null&&endMin>startMin)?(endMin-startMin):60;
      const heightPx=Math.max((durationMin/60)*ROW_H,18);
      html+='<div class="tg-ev"'
        +' style="top:'+topPx+'px;height:'+heightPx+'px;"'
        +' onclick="event.stopPropagation();ouvrirEv(\''+ev.id+'\')"'
        +' title="'+(ev.client||'')+(ev.debut?' · '+ev.debut:'')+(ev.fin?' → '+ev.fin:'')+'">'
        +(ev.debut?ev.debut+' ':'')+(ev.client||'')
        +'</div>';
    });

    html+='</div>'; // fin tg-col-body
  });

  html+='</div>'; // fin grille
  html+='</div></div>';
  return html;
}

// ---- VUE SEMAINE ----
function renderSemaine(){
  const lun=lundi(currentDate);
  const jours=[];
  for(let i=0;i<7;i++){const d=new Date(lun);d.setDate(lun.getDate()+i);jours.push(d);}
  const todayISO=fmtISO(new Date());
  document.getElementById('titre-periode').textContent=
    jours[0].toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' – '+
    jours[6].toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
  const html=buildGrille(
    jours,
    (d)=>JOURS[(d.getDay()+6)%7]+' '+d.getDate(),
    (d)=>fmtISO(d)===todayISO?'today-col':'',
    7,'52px'
  );
  document.getElementById('vue-container').innerHTML=html;
}

// ---- VUE JOUR ----
function renderJour(){
  const ds=fmtISO(currentDate);
  const todayISO=fmtISO(new Date());
  document.getElementById('titre-periode').textContent=fmtFR(currentDate).replace(/^\w/,c=>c.toUpperCase());
  const html=buildGrille(
    [currentDate],
    ()=>fmtFR(currentDate).replace(/^\w/,c=>c.toUpperCase()),
    ()=>ds===todayISO?'today-col':'',
    1,'60px'
  );
  document.getElementById('vue-container').innerHTML=html;
}

// ---- STATS ----
function updateStats(){
  const prefix=currentDate.getFullYear()+'-'+String(currentDate.getMonth()+1).padStart(2,'0');
  const liste=interventions.filter(i=>i.date&&i.date.startsWith(prefix));
  document.getElementById('stat-count').textContent=liste.length;
  document.getElementById('stat-total').textContent=liste.reduce((s,i)=>s+(parseFloat(i.tarif)||0),0).toFixed(2)+' €';
}

// ---- LISTE ----
function ouvrirListe(ds){
  jourEnCours=ds;
  const date=new Date(ds+'T12:00:00');
  document.getElementById('listeTitre').textContent=date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const evs=interventions.filter(e=>e.date===ds);
  let html='';
  evs.forEach(ev=>{
    html+='<div class="day-item" onclick="ouvrirEv(\''+ev.id+'\')">';
    html+='<div class="day-item-left">';
    html+='<div class="day-item-client">'+(ev.client||'—')+'</div>';
    html+='<div class="day-item-detail">'+(ev.debut||'')+( ev.fin?' → '+ev.fin:'')+( ev.adresse?' · '+ev.adresse:'')+'</div>';
    html+='</div><div class="day-item-tarif">'+(ev.tarif?ev.tarif+' €':'')+'</div></div>';
  });
  document.getElementById('dayList').innerHTML=html;
  document.getElementById('overlayListe').classList.add('visible');
}
function fermerListe(){document.getElementById('overlayListe').classList.remove('visible');}
document.getElementById('overlayListe').addEventListener('click',function(e){if(e.target===this)fermerListe();});

// ---- FORMULAIRE ----
function ouvrirFormulaire(idx,ds,heure,avecRetour){
  editIdx=idx!==null?idx:null;
  document.getElementById('formTitre').textContent=idx!==null?'Modifier intervention':'Nouvelle intervention';
  document.getElementById('btn-retour').style.display=avecRetour?'block':'none';
  viderForm();
  if(idx!==null){
    const i=interventions[idx];
    document.getElementById('f-date').value=i.date||'';
    document.getElementById('f-debut').value=i.debut||'';
    document.getElementById('f-fin').value=i.fin||'';
    document.getElementById('f-client').value=i.client||'';
    document.getElementById('f-adresse').value=i.adresse||'';
    document.getElementById('f-descriptif').value=i.descriptif||'';
    document.getElementById('f-donneur').value=i.donneur||'';
    document.getElementById('f-numero').value=i.numero||'';
    document.getElementById('f-tarif').value=i.tarif||'';
  } else {
    if(ds)document.getElementById('f-date').value=ds;
    if(heure)document.getElementById('f-debut').value=heure;
  }
  fermerListe();
  document.getElementById('overlayForm').classList.add('visible');
}
function ouvrirEv(id){
  const idx=interventions.findIndex(i=>i.id===id);
  if(idx===-1)return;
  ouvrirFormulaire(idx,null,null,jourEnCours!==null);
}
function retourListe(){fermerForm();if(jourEnCours)ouvrirListe(jourEnCours);}
function fermerForm(){document.getElementById('overlayForm').classList.remove('visible');editIdx=null;}
document.getElementById('overlayForm').addEventListener('click',function(e){if(e.target===this)fermerForm();});
function viderForm(){['f-date','f-debut','f-fin','f-client','f-adresse','f-descriptif','f-donneur','f-numero','f-tarif'].forEach(id=>document.getElementById(id).value='');}
function getFormData(id){
  return{id:id||Date.now().toString(),date:document.getElementById('f-date').value,debut:document.getElementById('f-debut').value,fin:document.getElementById('f-fin').value,client:document.getElementById('f-client').value,adresse:document.getElementById('f-adresse').value,descriptif:document.getElementById('f-descriptif').value,donneur:document.getElementById('f-donneur').value,numero:document.getElementById('f-numero').value,tarif:document.getElementById('f-tarif').value};
}

// ---- ACTIONS ----
async function ajouterIntervention(){interventions.push(getFormData(Date.now().toString()));await sauvegarder();render();fermerForm();jourEnCours=null;}
async function modifierIntervention(){if(editIdx===null){alert('Aucune intervention sélectionnée.');return;}interventions[editIdx]=getFormData(interventions[editIdx].id);await sauvegarder();render();fermerForm();jourEnCours=null;}
async function supprimerIntervention(){
  if(editIdx===null){alert('Aucune intervention sélectionnée.');return;}
  if(!confirm('Supprimer cette intervention ?'))return;
  // Mémoriser l'ID supprimé pour éviter la réinjection hors ligne
  const deletedId=interventions[editIdx].id;
  const deleted=JSON.parse(localStorage.getItem('synalojik_deleted')||'[]');
  deleted.push(deletedId);
  localStorage.setItem('synalojik_deleted',JSON.stringify(deleted));
  interventions.splice(editIdx,1);
  editIdx=null;
  await sauvegarder();render();fermerForm();jourEnCours=null;
}

// ---- EXPORT ----
function exportCSVMois(){
  const prefix=currentDate.getFullYear()+'-'+String(currentDate.getMonth()+1).padStart(2,'0');
  const liste=interventions.filter(i=>i.date&&i.date.startsWith(prefix));
  if(liste.length===0){alert('Aucune intervention ce mois-ci.');return;}
  let csv="Date;Début;Fin;Client;Adresse;Descriptif;Donneur d'ordre;N° intervention;Tarif\n";
  liste.forEach(i=>{csv+=`${i.date};${i.debut||''};${i.fin||''};${i.client||''};${i.adresse||''};${i.descriptif||''};${i.donneur||''};${i.numero||''};${i.tarif||''}\n`;});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='synalojik_'+prefix+'.csv';link.click();
}

render();
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/agenda/sw.js').catch(e=>console.log(e));
  });
}
</script>
