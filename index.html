<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agenda des interventions</title>
<!-- Nouvelles librairies Google -->
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; background:#f4f4f4; }
    h1 { text-align:center; margin-bottom:10px; }

    /* --- BARRE CONNEXION --- */
    #barre-connexion {
        max-width:900px;
        margin:0 auto 10px auto;
        display:flex;
        align-items:center;
        gap:12px;
        background:white;
        padding:8px 15px;
        border-radius:8px;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
        font-size:13px;
    }
    #barre-connexion button {
        padding:5px 12px;
        cursor:pointer;
        font-size:12px;
        border:1px solid #007bff;
        background:white;
        color:#007bff;
        border-radius:4px;
    }
    #barre-connexion button:hover { background:#007bff; color:white; }
    #statut { color:#555; }
    #statut.ok { color:#28a745; font-weight:bold; }

    .calendar-container {
        max-width: 900px;
        margin: 0 auto;
        background:white;
        border-radius:8px;
        padding:15px;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .calendar-header {
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:10px;
    }

    .calendar-header button {
        padding:5px 10px;
        cursor:pointer;
    }
    #btn-export-mois {
        background:#007bff;
        color:white;
        border:1px solid #007bff;
        border-radius:4px;
        font-size:12px;
        font-weight:bold;
    }

    .month-label {
        font-size:20px;
        font-weight:bold;
        text-transform:capitalize;
    }

    .calendar-grid {
        display:grid;
        grid-template-columns: repeat(7, 1fr);
        border:1px solid #ddd;
        border-radius:4px;
        overflow:hidden;
    }

    .day-name, .day-cell {
        border:1px solid #eee;
        min-height:90px;
        padding:4px;
        box-sizing:border-box;
        font-size:12px;
    }

    .day-name {
        background:#f0f0f0;
        text-align:center;
        font-weight:bold;
    }

    .day-number {
        font-weight:bold;
        margin-bottom:4px;
    }

    .day-cell {
        background:white;
        cursor:pointer;
        position:relative;
    }

    .day-cell.other-month {
        background:#fafafa;
        color:#aaa;
    }

    .day-cell.today {
        border:2px solid #007bff;
    }

    .day-cell.selected-day {
        background:#d9e8ff !important;
        border:2px solid #0057d8;
    }

    .event-line {
        font-size:10px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
    }

    .more-events {
        font-size:10px;
        color:#007bff;
    }

    /* --- FENÊTRE JOURNAL (MODAL) --- */
    .modal-bg {
        position:fixed;
        top:0; left:0;
        width:100%; height:100%;
        background:rgba(0,0,0,0.5);
        display:none;
        justify-content:center;
        align-items:center;
        z-index:1000;
    }

    .modal {
        background:white;
        width:90vw; max-width:750px;
        max-height:95vh;
        overflow:auto;
        border-radius:8px;
        padding:20px;
        box-shadow:0 4px 10px rgba(0,0,0,0.3);
        position:relative;
    }

    .close-btn {
        position:absolute;
        top:10px;
        right:10px;
        cursor:pointer;
        font-size:20px;
        font-weight:bold;
    }

    table { width:100%; border-collapse:collapse; margin-top:10px; font-size:13px; }
    th, td { border:1px solid #ccc; padding:6px; text-align:left; }
    th { background:#e3e3e3; }

    input[type="text"], input[type="number"], input[type="time"], input[type="date"], textarea {
        width:100%;
        padding:10px;
        margin:2px 0;
        font-size:14px;
        border:1px solid #ccc;
        border-radius:4px;
        box-sizing:border-box;
    }

    textarea {
        width:98%;
        resize:vertical;
    }

    .form-row { margin-bottom:8px; display:flex; flex-direction:column; gap:6px; }

    button { padding:6px 10px; margin:3px; cursor:pointer; font-size:12px; }
    .btn-modifier { background:#ffc107; border:none; border-radius:4px; padding:4px 8px; cursor:pointer; font-size:11px; }
    .btn-supprimer { background:#dc3545; color:white; border:none; border-radius:4px; padding:4px 8px; cursor:pointer; font-size:11px; }

    @media (max-width: 600px) {
        .modal {
            width:90vw !important;
            height:85vh !important;
            max-height:85vh !important;
            padding:15px !important;
            border-radius:12px;
            font-size:16px;
        }
        input, textarea, button {
            font-size:16px !important;
            padding:10px !important;
        }
        table { font-size:14px !important; }
        th, td { padding:8px !important; }
        .close-btn { font-size:28px !important; top:8px; right:12px; }
    }
</style>
</head>
<body>

<h1>Agenda des interventions</h1>

<!-- Barre de connexion Google -->
<div id="barre-connexion">
    <span id="statut">Non connecté à Google Drive</span>
    <button id="btn-connexion" onclick="demanderConnexion()">Se connecter</button>
</div>

<div class="calendar-container">
    <div class="calendar-header">
        <button onclick="changeMonth(-1)">&lt;</button>
        <div class="month-label" id="monthLabel"></div>
        <button onclick="changeMonth(1)">&gt;</button>
        <button id="btn-export-mois" onclick="exportCSVMois()">⬇ Exporter le mois CSV</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<!-- FENÊTRE JOURNAL -->
<div class="modal-bg" id="modalBg">
    <div class="modal">
        <div class="close-btn" onclick="closeModal()">×</div>

        <h2 id="journalTitle">Journal du jour</h2>
        <button onclick="exportCSV()" style="margin-bottom:10px; background:#007bff; color:white; border:none; padding:8px 14px; border-radius:4px; cursor:pointer; font-size:13px;">⬇ Exporter tout en CSV</button>

        <div class="form-row">
            <input type="date" id="date-intervention">
            <input type="time" id="debut" placeholder="Début">
            <input type="time" id="fin" placeholder="Fin">
            <input type="text" id="client" placeholder="Client">
            <input type="text" id="adresse" placeholder="Adresse">
        </div>

        <div class="form-row">
            <input type="text" id="numero" placeholder="Numéro intervention">
            <input type="text" id="donneur" placeholder="Donneur d'ordre">
            <textarea id="descriptif" placeholder="Descriptif" rows="3"></textarea>
            <input type="number" id="montant" placeholder="Montant (€)" step="0.01">
            <div style="display:flex; gap:8px; margin-top:8px;">
                <button onclick="ajouterIntervention()" style="flex:1; padding:12px; font-size:14px; font-weight:bold; background:#28a745; color:white; border:none; border-radius:4px; cursor:pointer;">✔ Ajouter</button>
                <button onclick="modifierSelectionne()" style="flex:1; padding:12px; font-size:14px; font-weight:bold; background:#ffc107; color:#000; border:none; border-radius:4px; cursor:pointer;">✏️ Modifier</button>
                <button onclick="supprimerSelectionne()" style="flex:1; padding:12px; font-size:14px; font-weight:bold; background:#dc3545; color:white; border:none; border-radius:4px; cursor:pointer;">🗑 Supprimer</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Début</th>
                    <th>Fin</th>
                    <th>Client</th>
                    <th>Donneur d'ordre</th>
                    <th>Adresse</th>
                    <th>Numéro intervention</th>
                    <th>Descriptif</th>
                    <th>Montant</th>
                </tr>
            </thead>
            <tbody id="journalBody"></tbody>
        </table>
    </div>
</div>

<script>
// ============================================================
// CONFIG GOOGLE DRIVE
// ============================================================
const CLIENT_ID = '857421313712-ge30q9selkt0s0t0dpa26g7c5l5oqbah.apps.googleusercontent.com';
const API_KEY   = 'AIzaSyBcCfAhpT7_eGXkc07fdBEViaHJHhmNCNA';
let FILE_ID = null; // sera trouvé ou créé automatiquement
const SCOPES    = 'https://www.googleapis.com/auth/drive.file';

let tokenClient;
let accessToken = null;

// ============================================================
// INIT GOOGLE (nouvelle méthode GIS — corrigée)
// ============================================================
window.addEventListener('load', () => {
    gapi.load('client', async () => {
        await gapi.client.init({
            apiKey: API_KEY,
            discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
        });

        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: async (resp) => {
                if (resp.error) { console.error(resp); return; }
                accessToken = resp.access_token;
                document.getElementById('statut').textContent = '✔ Connecté à Google Drive';
                document.getElementById('statut').className = 'ok';
                document.getElementById('btn-connexion').textContent = 'Déconnexion';
                document.getElementById('btn-connexion').onclick = deconnecter;
                await chargerJournalDepuisDrive();
                renderCalendar();
            }
        });

        // Tentative silencieuse (si déjà connecté)
        tokenClient.requestAccessToken({ prompt: '' });
    });
});

function demanderConnexion() {
    tokenClient.requestAccessToken({ prompt: 'consent' });
}

function deconnecter() {
    google.accounts.oauth2.revoke(accessToken, () => {
        accessToken = null;
        document.getElementById('statut').textContent = 'Non connecté à Google Drive';
        document.getElementById('statut').className = '';
        document.getElementById('btn-connexion').textContent = 'Se connecter';
        document.getElementById('btn-connexion').onclick = demanderConnexion;
    });
}

// ============================================================
// TROUVER OU CRÉER LE FICHIER journal.json SUR DRIVE
// ============================================================
async function obtenirFileId() {
    // 1. Cherche un fichier journal.json existant dans Drive
    const liste = await gapi.client.drive.files.list({
        q: "name='journal.json' and trashed=false",
        fields: 'files(id, name)',
        spaces: 'drive'
    });
    const fichiers = liste.result.files;
    if (fichiers && fichiers.length > 0) {
        FILE_ID = fichiers[0].id;
        console.log('Fichier journal.json trouvé :', FILE_ID);
        return;
    }
    // 2. Si introuvable → on le crée
    console.log('Fichier journal.json introuvable, création...');
    const res = await fetch(
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
        {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + accessToken },
            body: (() => {
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify({ name: 'journal.json', mimeType: 'application/json' })], { type: 'application/json' }));
                form.append('file', new Blob(['[]'], { type: 'application/json' }));
                return form;
            })()
        }
    );
    const data = await res.json();
    FILE_ID = data.id;
    console.log('Fichier journal.json créé :', FILE_ID);
}

// ============================================================
// LECTURE DRIVE
// ============================================================
async function chargerJournalDepuisDrive() {
    try {
        await obtenirFileId();
        const response = await gapi.client.drive.files.get({ fileId: FILE_ID, alt: 'media' });
        interventions = JSON.parse(response.body || '[]');
        console.log('Journal chargé :', interventions.length, 'interventions');
    } catch (err) {
        console.warn('Lecture Drive impossible, démarrage à vide.', err);
        interventions = [];
    }
}

// ============================================================
// ÉCRITURE DRIVE
// ============================================================
async function sauvegarderJournalDansDrive() {
    if (!accessToken) return; // pas connecté → on ne sauvegarde pas sur Drive
    try {
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify({ name: 'journal.json', mimeType: 'application/json' })], { type: 'application/json' }));
        form.append('file', new Blob([JSON.stringify(interventions)], { type: 'application/json' }));
        const res = await fetch(
            'https://www.googleapis.com/upload/drive/v3/files/' + FILE_ID + '?uploadType=multipart',
            { method: 'PATCH', headers: { 'Authorization': 'Bearer ' + accessToken }, body: form }
        );
        if (!res.ok) throw new Error('HTTP ' + res.status);
        console.log('Sauvegardé sur Drive.');
    } catch (err) {
        console.error('Erreur sauvegarde Drive', err);
        alert('Impossible de sauvegarder sur Google Drive (voir console).');
    }
}

// ============================================================
// AGENDA (ton code original — intact)
// ============================================================
const dayNames = ["Lun.","Mar.","Mer.","Jeu.","Ven.","Sam.","Dim."];

let interventions = [];
let currentDate = new Date();
let selectedDate = new Date();

function formatDateISO(date) {
    return date.toISOString().split("T")[0];
}

function formatDateFR(date) {
    return date.toLocaleDateString("fr-FR");
}

function renderCalendar() {
    const grid = document.getElementById("calendarGrid");
    grid.innerHTML = "";

    dayNames.forEach(d => {
        const div = document.createElement("div");
        div.className = "day-name";
        div.textContent = d;
        grid.appendChild(div);
    });

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const firstDay = new Date(year, month, 1);
    const startDay = (firstDay.getDay() + 6) % 7;

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrevMonth = new Date(year, month, 0).getDate();

    document.getElementById("monthLabel").textContent =
        currentDate.toLocaleDateString("fr-FR", { month: "long", year: "numeric" });

    for (let i = 0; i < startDay; i++) {
        const dayNum = daysInPrevMonth - startDay + 1 + i;
        const cellDate = new Date(year, month - 1, dayNum);
        createDayCell(grid, cellDate, true);
    }

    for (let d = 1; d <= daysInMonth; d++) {
        const cellDate = new Date(year, month, d);
        createDayCell(grid, cellDate, false);
    }

    const totalCells = 7 + startDay + daysInMonth;
    const remaining = 49 - totalCells;
    for (let i = 1; i <= remaining; i++) {
        const cellDate = new Date(year, month + 1, i);
        createDayCell(grid, cellDate, true);
    }
}

function createDayCell(grid, date, otherMonth) {
    const div = document.createElement("div");
    div.className = "day-cell";
    if (otherMonth) div.classList.add("other-month");

    const todayISO = formatDateISO(new Date());
    const cellISO = formatDateISO(date);
    if (cellISO === todayISO) div.classList.add("today");

    const dayNumber = document.createElement("div");
    dayNumber.className = "day-number";
    dayNumber.textContent = date.getDate();
    div.appendChild(dayNumber);

    const todaysInterventions = interventions.filter(i => i.date === cellISO);

    todaysInterventions.slice(0,3).forEach(ev => {
        const line = document.createElement("div");
        line.className = "event-line";
        line.textContent = `${ev.debut} ${ev.client}`;
        div.appendChild(line);
    });

    if (todaysInterventions.length > 3) {
        const more = document.createElement("div");
        more.className = "more-events";
        more.textContent = `+${todaysInterventions.length - 3} autres`;
        div.appendChild(more);
    }

    div.onclick = () => {
        document.querySelectorAll(".day-cell").forEach(c => c.classList.remove("selected-day"));
        div.classList.add("selected-day");
        selectedDate = date;
        openModal();
        updateJournal();
    };

    grid.appendChild(div);
}

function changeMonth(delta) {
    currentDate.setMonth(currentDate.getMonth() + delta);
    renderCalendar();
}

function openModal() {
    document.getElementById("modalBg").style.display = "flex";
}

function closeModal() {
    document.getElementById("modalBg").style.display = "none";
}

function updateJournal() {
    const tbody = document.getElementById("journalBody");
    tbody.innerHTML = "";

    const iso = formatDateISO(selectedDate);
    document.getElementById("journalTitle").textContent =
        "Journal du " + formatDateFR(selectedDate);

    const list = interventions.filter(i => i.date === iso);

    window._selectedIdx = null;
    list.forEach((i, idx) => {
        const realIdx = interventions.findIndex(x => x === i);
        const tr = document.createElement("tr");
        tr.style.cursor = "pointer";
        tr.innerHTML = `
            <td>${i.debut || ""}</td>
            <td>${i.fin || ""}</td>
            <td>${i.client || ""}</td>
            <td>${i.donneur || ""}</td>
            <td>${i.adresse || ""}</td>
            <td>${i.numero || ""}</td>
            <td>${i.descriptif || ""}</td>
            <td>${i.montant || ""}€</td>
        `;
        tr.onclick = () => {
            // Désélectionner les autres
            document.querySelectorAll('#journalBody tr').forEach(r => r.style.background = '');
            tr.style.background = '#d9e8ff';
            window._selectedIdx = realIdx;
            // Remplir le formulaire
            document.getElementById('date-intervention').value = i.date || '';
            document.getElementById('debut').value = i.debut || '';
            document.getElementById('fin').value = i.fin || '';
            document.getElementById('client').value = i.client || '';
            document.getElementById('adresse').value = i.adresse || '';
            document.getElementById('numero').value = i.numero || '';
            document.getElementById('donneur').value = i.donneur || '';
            document.getElementById('descriptif').value = i.descriptif || '';
            document.getElementById('montant').value = i.montant || '';
        };
        tbody.appendChild(tr);
    });
}

function ajouterIntervention() {
    const dateChamp = document.getElementById('date-intervention').value;
    const iso = dateChamp || formatDateISO(selectedDate);
    const i = {
        date: iso,
        debut: document.getElementById('debut').value,
        fin: document.getElementById('fin').value,
        client: document.getElementById('client').value,
        donneur: document.getElementById('donneur').value,
        adresse: document.getElementById('adresse').value,
        numero: document.getElementById('numero').value,
        descriptif: document.getElementById('descriptif').value,
        montant: document.getElementById('montant').value
    };
    i.id = Date.now().toString();
    interventions.push(i);
    sauvegarderJournalDansDrive();

    ["date-intervention","debut","fin","client","donneur","adresse","numero","descriptif","montant"]
        .forEach(id => document.getElementById(id).value = "");

    updateJournal();
    renderCalendar();
}

function modifierSelectionne() {
    if (window._selectedIdx === null || window._selectedIdx === undefined) {
        alert('Clique sur une ligne du tableau pour la sélectionner.');
        return;
    }
    modifierIntervention(window._selectedIdx);
    window._selectedIdx = null;
}

function supprimerSelectionne() {
    if (window._selectedIdx === null || window._selectedIdx === undefined) {
        alert('Clique sur une ligne du tableau pour la sélectionner.');
        return;
    }
    supprimerIntervention(window._selectedIdx);
    window._selectedIdx = null;
}

function supprimerIntervention(idx) {
    if (!confirm('Supprimer cette intervention ?')) return;
    interventions.splice(idx, 1);
    sauvegarderJournalDansDrive();
    updateJournal();
    renderCalendar();
}

function modifierIntervention(idx) {
    const i = interventions[idx];
    document.getElementById('date-intervention').value = i.date || '';
    document.getElementById('debut').value = i.debut || '';
    document.getElementById('fin').value = i.fin || '';
    document.getElementById('client').value = i.client || '';
    document.getElementById('adresse').value = i.adresse || '';
    document.getElementById('numero').value = i.numero || '';
    document.getElementById('donneur').value = i.donneur || '';
    document.getElementById('descriptif').value = i.descriptif || '';
    document.getElementById('montant').value = i.montant || '';

    // Supprimer l'ancienne et laisser l'utilisateur re-sauvegarder
    interventions.splice(idx, 1);
    sauvegarderJournalDansDrive();
    updateJournal();
    renderCalendar();
    document.getElementById('debut').focus();
}

function exportCSVMois() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const moisStr = (month + 1).toString().padStart(2, '0');
    const prefix = year + '-' + moisStr;

    const liste = interventions.filter(i => i.date && i.date.startsWith(prefix));

    if (liste.length === 0) {
        alert('Aucune intervention ce mois-ci.');
        return;
    }

    let csv = "Date;Début;Fin;Client;Adresse;Numéro intervention;Donneur d'ordre;Descriptif;Montant\n";
    liste.forEach(i => {
        csv += `${i.date};${i.debut||""};${i.fin||""};${i.client||""};${i.adresse||""};${i.numero||""};${i.donneur||""};${i.descriptif||""};${i.montant||""}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "interventions_" + prefix + ".csv";
    link.click();
}

function exportCSV() {
    let csv = "Date;Début;Fin;Client;Donneur d'ordre;Adresse;Numéro intervention;Descriptif;Montant\n";
    interventions.forEach(i => {
        csv += `${i.date};${i.debut||""};${i.fin||""};${i.client||""};${i.donneur||""};${i.adresse||""};${i.numero||""};${i.descriptif||""};${i.montant||""}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "journal_interventions.csv";
    link.click();
}

renderCalendar();
</script>

</body>
</html>
